<!DOCTYPE html>
<html lang="km">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>🎂 Birthday Wish</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

  <script>
    (function () {
      for (var i = 0; i < 18; i++) {
        var p = document.createElement('div'); p.className = 'petal';
        p.style.left = Math.random() * 100 + '%';
        p.style.width = (7 + Math.random() * 11) + 'px';
        p.style.height = (7 + Math.random() * 11) + 'px';
        p.style.animationDuration = (5 + Math.random() * 9) + 's';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.opacity = (.25 + Math.random() * .5).toString();
        document.body.appendChild(p);
      }
    })();
  </script>

  <!-- Creator -->
  <div class="container">
    <h2>🎂 Birthday Wishes</h2>
    <div class="field"><label>From (ឈ្មោះអ្នក)</label><input type="text" id="iFrom" placeholder="Your name…"></div>
    <div class="field"><label>To (ឈ្មោះម្ចាស់ខួប)</label><input type="text" id="iTo" placeholder="Birthday person…">
    </div>
    <div class="field"><label>Wish Message (ពាក្យជួនពរ)</label><textarea id="iWish"
        placeholder="Write your heartfelt wish…"></textarea></div>
    <div class="btn-row">
      <button class="btn-save" id="btnSave">💾 Save</button>
      <button class="btn-share" id="btnGen">🎁 Generate</button>
    </div>
    <div id="share-box">
      <div class="share-title">🎀 Share via Telegram / WhatsApp</div>
      <div class="telegram-tip">
        <strong>📱 របៀប Share ក្នុង Telegram:</strong>
        <div class="step">
          <div class="num">1</div>
          <div>ចុច <strong>⬇️ Download</strong> ខាងក្រោម</div>
        </div>
        <div class="step">
          <div class="num">2</div>
          <div>បើក Telegram → ចុច 📎 → ជ្រើស <code>birthday-card.html</code> → Send</div>
        </div>
        <div class="step">
          <div class="num">3</div>
          <div>ម្ចាស់ខួបចុចលើ file → browser បើក → ឃើញស្រោមសំបុត្រ 💌</div>
        </div>
      </div>
      <button class="btn-dl" id="btnDl">⬇️ Download birthday-card.html</button>
      <button class="btn-pv" id="btnPv">👁️ Preview ស្រោមសំបុត្រ</button>
    </div>
  </div>

  <!-- Overlay -->
  <div id="overlay">
    <button class="ov-close" id="btnClose">✕</button>
    
    <div class="ov-content">
      <div class="ov-title" id="ovTitle">Happy Birthday! 🎉</div>

      <!--
      STAGE: card and wrapper are SIBLINGS.
      Card is NOT inside wrapper → no clipping!
    -->
      <div class="stage" id="stage">
        <div class="card" id="card">
          <div class="ht">💕</div>
          <div class="cto" id="cTo"></div>
          <div class="msg" id="cMsg"></div>
          <div class="frm" id="cFrom"></div>
        </div>
        <div class="wrapper" id="wrapper">
          <div class="lid one"></div>
          <div class="lid two"></div>
          <div class="flap"></div>
        </div>
      </div>

      <div class="hint" id="hint">✨ ចុចលើស្រោមសំបុត្រដើម្បីបើក ✨</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function () {
      var html = '', opened = false;

      function G(id) { return document.getElementById(id) }
      function toast(m) { var t = G('toast'); t.textContent = m; t.classList.add('show'); setTimeout(function () { t.classList.remove('show') }, 3200) }
      function confetti() {
        var cl = ['#f48fb1', '#e91e8c', '#f06292', '#f8bbd0', '#ad1457', '#d4af6a', '#fff9c4'];
        var sh = ['50%', '3px', '50% 0 50% 0'];
        for (var i = 0; i < 60; i++) {
          (function (i) {
            setTimeout(function () {
              var c = document.createElement('div'); c.className = 'cf';
              var s = 5 + Math.random() * 9;
              c.style.cssText = 'left:' + (3 + Math.random() * 94) + '%;top:-12px;width:' + s + 'px;height:' + s + 'px;background:' + cl[Math.floor(Math.random() * cl.length)] + ';border-radius:' + sh[Math.floor(Math.random() * sh.length)] + ';animation-delay:' + Math.random() + 's;animation-duration:' + (2 + Math.random() * 1.8) + 's';
              document.body.appendChild(c);
              setTimeout(function () { c.remove() }, 5000);
            }, i * 28);
          })(i);
        }
      }

      window.addEventListener('load', function () {
        G('iFrom').value = localStorage.getItem('bf') || '';
        G('iTo').value = localStorage.getItem('bt') || '';
        G('iWish').value = localStorage.getItem('bw') || '';
        // Preload the page stylesheet so we can inline it into exported HTML
        (function () {
          try {
            fetch('style.css?v=2').then(function (r) { if (r.ok) return r.text(); throw 0 }).then(function (t) { window.__externalCSS = t }).catch(function () { });
          } catch (e) { }
        })();
      });

      G('btnSave').onclick = function () {
        localStorage.setItem('bf', G('iFrom').value);
        localStorage.setItem('bt', G('iTo').value);
        localStorage.setItem('bw', G('iWish').value);
        toast('✅ Saved!');
      };

      /* ── Build standalone page ── */
      function build(from, to, wish) {
        var d = document.implementation.createHTMLDocument('Birthday');
        var m = d.createElement('meta'); m.setAttribute('charset', 'UTF-8'); d.head.appendChild(m);
        var mv = d.createElement('meta'); mv.name = 'viewport'; mv.content = 'width=device-width,initial-scale=1.0'; d.head.appendChild(mv);
        d.title = 'Happy Birthday, ' + to + '! 🎂';
        var lk = d.createElement('link'); lk.rel = 'stylesheet'; lk.href = 'https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap'; d.head.appendChild(lk);

        var st = d.createElement('style');
        var ext = (window.__externalCSS && typeof window.__externalCSS === 'string') ? window.__externalCSS : '';
        var fallback = '*{box-sizing:border-box;margin:0;padding:0}'
          + 'body{font-family:"Kantumruy Pro",sans-serif;background:linear-gradient(135deg,#fce4ec,#f8bbd0 50%,#fce4ec);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:20px;gap:0}'
          + '.pt{position:fixed;border-radius:50% 0 50% 0;background:radial-gradient(circle,#f48fb1,#f06292);pointer-events:none;z-index:0;animation:fp linear infinite}'
          + '@keyframes fp{0%{transform:translateY(-20px) rotate(0deg);opacity:.7}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}'
          + '.ov-content{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;width:100%;max-height:100vh;overflow:hidden;margin-top:-40px}'
          + '.ov-title{font-family:"Playfair Display",serif;font-style:italic;font-size:clamp(1.1rem,4vw,1.6rem);color:#ad1457;text-align:center;padding:0 20px;max-height:60px;overflow:hidden;transition:max-height .3s,opacity .3s,margin .3s;margin-bottom:4px;animation:fdD .6s ease both;z-index:10;flex-shrink:0}'
          + '.ov-title.gone{opacity:0;max-height:0;margin-bottom:0;pointer-events:none}'
          + '@keyframes fdD{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}'
          + '.stage{position:relative;width:300px;height:370px;cursor:pointer;perspective:1000px;animation:popIn .7s cubic-bezier(.34,1.56,.64,1) .1s both;flex-shrink:0}'
          + '@keyframes popIn{from{opacity:0;transform:scale(.6) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}'
          + '.card{position:absolute;left:50%;bottom:10px;transform:translate(-50%,0) scale(0.9);opacity:0;width:300px;height:250px;background:#fff;border-radius:14px;z-index:2;display:flex;flex-direction:column;align-items:center;padding:14px 16px 12px;box-shadow:0 -6px 24px rgba(233,30,140,.15);transition:transform .8s cubic-bezier(.34,1.56,.64,1),opacity .4s ease}'
          + '.card.show{opacity:1;z-index:20;transform:translate(-50%,19px) scale(1)}'
          + '.card .ht{font-size:1.1rem;flex-shrink:0}'
          + '.card .cto{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:#f06292;flex-shrink:0}'
          + '.card .msg{font-family:"Playfair Display",serif;font-style:italic;font-size:.82rem;color:#6d2849;line-height:1.55;white-space:pre-wrap;text-align:center;flex:1;overflow-y:auto;width:100%;scrollbar-width:none}'
          + '.card .msg::-webkit-scrollbar{display:none}'
          + '.card .frm{font-size:.73rem;color:#f48fb1;font-style:italic;flex-shrink:0}'
          + '.wrapper{position:absolute;bottom:0;left:0;right:0;height:200px;background:#e91e8c;display:flex;justify-content:center;z-index:5;filter:drop-shadow(0 14px 28px rgba(233,30,140,.28))}'
          + '.lid{position:absolute;height:100%;width:100%;top:0;left:0;border-right:150px solid transparent;border-bottom:100px solid transparent;border-left:150px solid transparent;transform-origin:top;backface-visibility:hidden;transition:transform .7s cubic-bezier(.4,0,.2,1)}'
          + '.lid.one{border-top:100px solid #f48fb1;transform:rotateX(0deg);z-index:3}'
          + '.lid.two{border-top:100px solid #e91e8c;transform:rotateX(90deg);z-index:1}'
          + '.flap{position:absolute;height:100%;width:100%;top:0;left:0;border-top:100px solid transparent;border-right:150px solid #f8bbd0;border-bottom:100px solid #f48fb1;border-left:150px solid #fce4ec;z-index:3}'
          + '.wrapper.open .lid.one{transform:rotateX(90deg)}'
          + '.wrapper.open .lid.two{transform:rotateX(180deg);transition-delay:.15s}'
          + '.hint{margin-top:8px;font-size:.8rem;color:#ad1457;letter-spacing:1.5px;text-transform:uppercase;animation:pulse 2s infinite;text-align:center;padding:0 20px;transition:opacity .4s;z-index:10;flex-shrink:0}'
          + '@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}'
          + '.cf{position:fixed;pointer-events:none;animation:cfall 3s ease-out forwards;z-index:300}'
          + '@keyframes cfall{0%{transform:translateY(-10px) rotate(0deg) scale(1);opacity:1}85%{opacity:1}100%{transform:translateY(105vh) rotate(1080deg) scale(.4);opacity:0}}';
        st.textContent = ext && ext.length > 10 ? ext : fallback;
        d.head.appendChild(st);

        /* Title */
        var ttl = d.createElement('div'); ttl.className = 'ov-title'; ttl.id = 'ttl'; ttl.textContent = 'Happy Birthday, ' + to + '! 🎉';
        
        /* Stage */
        var stage = d.createElement('div'); stage.className = 'stage'; stage.id = 'stage';

        /* Card (sibling, not child of wrapper) */
        var card = d.createElement('div'); card.className = 'card'; card.id = 'card';
        var ht = d.createElement('div'); ht.className = 'ht'; ht.textContent = '💕';
        var cto = d.createElement('div'); cto.className = 'cto'; cto.textContent = 'Dear ' + to;
        var msg = d.createElement('div'); msg.className = 'msg'; msg.textContent = wish;
        var frm = d.createElement('div'); frm.className = 'frm'; frm.textContent = '— ' + from + ' 💗';
        card.appendChild(ht); card.appendChild(cto); card.appendChild(msg); card.appendChild(frm);
        stage.appendChild(card);

        /* Wrapper (envelope only) */
        var wr = d.createElement('div'); wr.className = 'wrapper'; wr.id = 'wr';
        var l1 = d.createElement('div'); l1.className = 'lid one'; wr.appendChild(l1);
        var l2 = d.createElement('div'); l2.className = 'lid two'; wr.appendChild(l2);
        var fl = d.createElement('div'); fl.className = 'flap'; wr.appendChild(fl);
        stage.appendChild(wr);

        /* Hint */
        var hint = d.createElement('div'); hint.className = 'hint'; hint.id = 'hint'; hint.textContent = '✨ ចុចលើស្រោមសំបុត្រដើម្បីបើក ✨';
        
        /* Wrap all three in ov-content */
        var wrap = d.createElement('div'); wrap.className = 'ov-content';
        wrap.appendChild(ttl);
        wrap.appendChild(stage);
        wrap.appendChild(hint);
        d.body.appendChild(wrap);

        /* Script */
        var sc = d.createElement('script');
        sc.textContent = '(function(){'
          /* petals */
          + 'for(var i=0;i<18;i++){var p=document.createElement("div");p.className="pt";p.style.left=Math.random()*100+"%";p.style.width=(7+Math.random()*11)+"px";p.style.height=(7+Math.random()*11)+"px";p.style.animationDuration=(5+Math.random()*9)+"s";p.style.animationDelay=Math.random()*8+"s";p.style.opacity=(.25+Math.random()*.5).toString();document.body.appendChild(p);}'
          /* confetti fn */
          + 'function confetti(){var cl=["#f48fb1","#e91e8c","#f06292","#f8bbd0","#ad1457","#d4af6a","#fff9c4"],sh=["50%","3px","50% 0 50% 0"];for(var i=0;i<60;i++){(function(i){setTimeout(function(){var c=document.createElement("div");c.className="cf";var s=5+Math.random()*9;c.style.cssText="left:"+(3+Math.random()*94)+"%;top:-12px;width:"+s+"px;height:"+s+"px;background:"+cl[Math.floor(Math.random()*cl.length)]+";border-radius:"+sh[Math.floor(Math.random()*sh.length)]+";animation-delay:"+Math.random()+"s;animation-duration:"+(2+Math.random()*1.8)+"s";document.body.appendChild(c);setTimeout(function(){c.remove()},5000)},i*28)})(i)}}'
          /* click */
          + 'var done=false;'
          + 'document.getElementById("stage").addEventListener("click",function(){'
          + 'if(done)return;done=true;'
          + 'var wr=document.getElementById("wr"),card=document.getElementById("card"),ttl=document.getElementById("ttl"),hint=document.getElementById("hint");'
          /* open lid */
          + 'wr.classList.add("open");'
          + 'ttl.classList.add("gone");'
          + 'hint.style.opacity="0";'
          /* show card by class to match CSS */
          + 'setTimeout(function(){card.classList.add("show")},600);'
          /* confetti */
          + 'setTimeout(confetti,1350);'
          + '});'
          + '})();';
        d.body.appendChild(sc);
        return '<!DOCTYPE html>\n' + d.documentElement.outerHTML;
      }

      G('btnGen').onclick = function () {
        var w = G('iWish').value.trim();
        if (!w) { toast('⚠️ Write a wish first!'); return; }
        var fromVal = G('iFrom').value.trim() || 'Someone';
        var toVal = G('iTo').value.trim() || 'Friend';

        // Ensure we inline the latest style.css before building the exported HTML
        try {
          fetch('style.css?v=2').then(function (r) { if (r.ok) return r.text(); return ''; }).then(function (t) {
            if (t) window.__externalCSS = t;
            html = build(fromVal, toVal, w);
            G('share-box').style.display = 'block';
            toast('🎀 Ready! Download & send via Telegram');
          }).catch(function () {
            html = build(fromVal, toVal, w);
            G('share-box').style.display = 'block';
            toast('🎀 Ready! Download & send via Telegram');
          });
        } catch (e) {
          html = build(fromVal, toVal, w);
          G('share-box').style.display = 'block';
          toast('🎀 Ready! Download & send via Telegram');
        }
      };

      G('btnDl').onclick = function () {
        if (!html) { toast('Click Generate first!'); return; }
        var a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
        a.download = 'birthday-card.html'; a.click();
        toast('✅ Downloaded! Send via Telegram 📱');
      };

      G('btnPv').onclick = function () {
        if (!html) { toast('Click Generate first!'); return; }
        var from = G('iFrom').value.trim() || 'Someone';
        var to = G('iTo').value.trim() || 'Friend';
        var wish = G('iWish').value.trim();

        /* populate data */
        G('ovTitle').textContent = 'Happy Birthday, ' + to + '! 🎉';
        G('cTo').textContent = 'Dear ' + to;
        G('cMsg').textContent = wish;
        G('cFrom').textContent = '— ' + from + ' 💗';

        /* RESET ស្ថានភាពដើម */
        opened = false;
        G('wrapper').classList.remove('open');

        var card = G('card');
        card.classList.remove('show'); // ដក Class បង្ហាញចេញ ដើម្បីឱ្យវាទៅសម្ងំក្នុងស្រោមវិញ
        card.style.opacity = "";      // លុប inline style ចាស់ៗចេញឱ្យអស់
        card.style.transform = "";    // លុប inline style ចាស់ៗចេញឱ្យអស់

        G('ovTitle').classList.remove('gone');
        G('hint').style.opacity = '1';
        G('overlay').classList.add('on');
      };

      G('btnClose').onclick = function () { G('overlay').classList.remove('on') };

      /* Stage click: បើកស្រោមសំបុត្រ → រុញ Card ឡើង → ទម្លាក់ចុះលើស្រោមវិញ */
      G('stage').addEventListener('click', function () {
        if (opened) return;
        opened = true;

        G('wrapper').classList.add('open');
        G('ovTitle').classList.add('gone');
        G('hint').style.opacity = '0';

        // ឱ្យ Card ហោះឡើងក្រោយស្រោមសំបុត្របើកបាន ០.៥ វិនាទី
        setTimeout(function () {
          G('card').classList.add('show');
        }, 500);

        setTimeout(confetti, 800);
      });

      function confetti() {
        var cl = ['#f48fb1', '#e91e8c', '#f06292', '#f8bbd0', '#ad1457', '#d4af6a', '#fff9c4'];
        var sh = ['50%', '3px', '50% 0 50% 0'];
        for (var i = 0; i < 60; i++) {
          (function (i) {
            setTimeout(function () {
              var c = document.createElement('div'); c.className = 'cf';
              var s = 5 + Math.random() * 9;
              c.style.cssText = 'left:' + (3 + Math.random() * 94) + '%;top:-12px;width:' + s + 'px;height:' + s + 'px;background:' + cl[Math.floor(Math.random() * cl.length)] + ';border-radius:' + sh[Math.floor(Math.random() * sh.length)] + ';animation-delay:' + Math.random() + 's;animation-duration:' + (2 + Math.random() * 1.8) + 's';
              document.body.appendChild(c);
              setTimeout(function () { c.remove() }, 5000);
            }, i * 28);
          })(i);
        }
      }

    })();
  </script>
</body>

</html>
